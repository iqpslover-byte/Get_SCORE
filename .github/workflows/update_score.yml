name: Update Score Ledger

on:
  schedule:
    - cron: '15 3 * * *'   # 毎日 03:15 UTC (12:15 JST)
  workflow_dispatch:        # 手動実行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update ledger
        run: python score.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --staged --quiet || git commit -m "Update ledger $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
